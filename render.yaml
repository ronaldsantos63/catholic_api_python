services:
  - type: web
    name: catholic-api-python
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 30
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: BASE_URL
        value: https://liturgia.cancaonova.com
      - key: REQUEST_TIMEOUT
        value: "10"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS
        value: "120"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: MAX_CONTENT_LENGTH
        value: "1024"
      - key: SECURITY_HSTS_ENABLED
        value: "true"
